name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: cp-platform/package-lock.json
      - name: Install dependencies
        run: cd cp-platform && npm ci
      - name: Run lint
        run: cd cp-platform && npm run lint
      - name: Run tests
        run: cd cp-platform && npm run test
      - name: Run build
        run: cd cp-platform && npm run build
